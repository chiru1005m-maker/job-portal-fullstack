# 1. DATABASE CONFIGURATION (Fixed Connection String)
# Added IFEXISTS=FALSE to allow automatic database creation
spring.datasource.url=jdbc:h2:file:./data/jobportal;DB_CLOSE_DELAY=-1;IFEXISTS=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# 2. JPA & HIBERNATE SETTINGS
# Changed 'none' to 'update' so Hibernate can automatically add the cvPath column
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# 3. FLYWAY (Disabled temporarily to stop the 50100 crash)
# Since you are using Hibernate 'update', Flyway is not needed for local dev
spring.flyway.enabled=false

# 4. H2 WEB CONSOLE SETTINGS
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# 5. SERVER & SECURITY
server.port=8080
spring.main.allow-bean-definition-overriding=true
app.jwt.secret=7a6b4c92d1e5f8a3b0c9d8e7f6a5b4c3d2e1f0a9b8c7d6e5f4a3b2c1d0e9f8a7
app.jwt.expiration-ms=86400000

# 6. CORS & FILE UPLOADS
app.client.origins=http://localhost:5173
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 7. LOGGING
logging.level.org.springframework.security=DEBUG