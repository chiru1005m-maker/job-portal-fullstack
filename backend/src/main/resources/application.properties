# 1. POSTGRESQL DATABASE CONFIGURATION
# Using sslmode=require to fix the 'root.crt' missing file error
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. HIBERNATE / JPA SETTINGS
# 'update' ensures tables are created automatically on your Render database
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 3. FLYWAY
# Keep disabled initially to avoid conflicts during the first table generation
spring.flyway.enabled=false

# 4. SERVER CONFIGURATION
# Render uses 8080 by default for Spring Boot
server.port=8080

# 5. SECURITY & JWT
# Uses the environment variable you set in the Render dashboard
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=86400000

# 6. CORS ALLOWED ORIGINS
# Include localhost for your local dev and your eventual frontend URL
app.client.origins=http://localhost:5173,https://your-frontend-site.onrender.com

# 7. LOGGING (Crucial for debugging startup issues)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE