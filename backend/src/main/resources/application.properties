# 1. POSTGRESQL DATABASE CONFIGURATION
# Using environment variables for security (set these in the Render dashboard)
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?ssl=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. HIBERNATE / JPA SETTINGS
# 'update' will create/update tables automatically on Render
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# 3. FLYWAY (Disabled to prevent migration conflicts on first deploy)
spring.flyway.enabled=false

# 4. SERVER CONFIGURATION
server.port=8080

# 5. SECURITY & JWT
# On Render, you can also set this as an Environment Variable named APP_JWT_SECRET
app.jwt.secret=${APP_JWT_SECRET:change-me-replace-with-secure-value}
app.jwt.expiration-ms=86400000

# 6. CORS ALLOWED ORIGINS
# Replace 'your-frontend.onrender.com' with your actual Vercel or Render frontend URL
app.client.origins=http://localhost:5173,https://your-frontend-url.vercel.app