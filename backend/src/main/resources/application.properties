# Data source (development default: in-memory to avoid H2 file locking issues)
# For persistent file DB change this to jdbc:h2:file:./data/jobportal and remove unsupported flags for your H2 version
spring.datasource.url=jdbc:h2:mem:jobportal;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Server port
server.port=8080

# JWT
app.jwt.secret=change-me-replace-with-secure-value
app.jwt.expiration-ms=86400000

# CORS allowed origins (for dev)
# add local static server ports (8000) and dev server 5173
app.client.origins=http://localhost:5173,http://localhost:8000,http://127.0.0.1:8000

# NOTE: To use PostgreSQL in production, update spring.datasource.url, username and password accordingly.