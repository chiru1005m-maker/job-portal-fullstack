# 1. POSTGRESQL DATABASE CONFIGURATION
# sslmode=require ensures a secure connection to Render's database
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. HIBERNATE / JPA SETTINGS
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 3. FLYWAY
spring.flyway.enabled=false

# 4. SERVER CONFIGURATION
server.port=8080

# 5. SECURITY & JWT
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=86400000

# 6. CORS ALLOWED ORIGINS (FINAL PRODUCTION SETUP)
# This includes your local development port and your official live Render URL
app.client.origins=http://localhost:5173,https://job-portal-fullstack-nc5u.onrender.com

# 7. LOGGING
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE