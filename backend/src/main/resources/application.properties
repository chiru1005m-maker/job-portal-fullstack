# 1. POSTGRESQL DATABASE CONFIGURATION
# Using sslmode=require bypasses the root.crt error seen in previous logs
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. HIBERNATE / JPA SETTINGS
# 'update' automatically created your tables in the latest successful log
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 3. FLYWAY
# Disabled to allow Hibernate to manage the initial schema
spring.flyway.enabled=false

# 4. SERVER CONFIGURATION
# Standard port for Render Spring Boot deployments
server.port=8080

# 5. SECURITY & JWT
# Strictly uses the APP_JWT_SECRET from your Render Environment Group
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=86400000

# 6. CORS ALLOWED ORIGINS
# Replace the third URL below with the actual URL Render gave your frontend
app.client.origins=http://localhost:5173,http://localhost:3000,https://job-portal-fullstack-nc5u.onrender.com

# 7. LOGGING
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE